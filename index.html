<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunter Call</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--surface:#171717;--surface2:#1f1f1f;
  --border:#2a2a2a;--border2:#333;--text:#f0f0f0;--muted:#777;--muted2:#555;
  --accent:#00e5a0;--accent-dim:rgba(0,229,160,0.12);--accent-b:rgba(0,229,160,0.3);
  --red:#ff4d4d;--red-dim:rgba(255,77,77,0.12);--red-b:rgba(255,77,77,0.3);
  --yellow:#f5a623;--yellow-dim:rgba(245,166,35,0.12);--yellow-b:rgba(245,166,35,0.3);
  --blue:#4d9fff;--blue-dim:rgba(77,159,255,0.12);--blue-b:rgba(77,159,255,0.3);
  --purple:#b06aff;--purple-dim:rgba(176,106,255,0.12);--purple-b:rgba(176,106,255,0.3);
  --wa:#25D366;--wa-dim:rgba(37,211,102,0.12);--wa-b:rgba(37,211,102,0.3);
  --chat-w:380px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px;transition:padding-right 0.3s ease;}
body.chat-open{padding-right:calc(var(--chat-w) + 24px);}
header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.logo{width:32px;height:32px;border-radius:9px;background:var(--accent-dim);border:1px solid var(--accent-b);display:flex;align-items:center;justify-content:center;}
.logo svg{width:16px;height:16px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;}
h1{font-size:17px;font-weight:500;}h1 span{color:var(--accent);}
.wa-status-pill{margin-left:auto;display:flex;align-items:center;gap:7px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);font-size:12px;color:var(--muted);cursor:pointer;transition:all 0.15s;font-family:'DM Mono',monospace;}
.wa-status-pill:hover{border-color:#555;color:var(--text);}
.wa-status-pill.connected{border-color:var(--wa-b);background:var(--wa-dim);color:var(--wa);}
.wa-status-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--muted2);flex-shrink:0;}
.wa-status-pill.connected .dot{background:var(--wa);}
.config-bar{display:flex;gap:10px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:14px;align-items:flex-end;}
.cfg{display:flex;flex-direction:column;gap:4px;}
.cfg label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;font-family:'DM Mono',monospace;}
.cfg input{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:7px 11px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color 0.15s;width:100%;}
.cfg input:focus{border-color:var(--accent);}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.btn{background:var(--surface);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:6px 13px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background 0.15s;white-space:nowrap;}
.btn:hover{background:var(--surface2);}
.btn-g{background:var(--accent-dim);border-color:var(--accent-b);color:var(--accent);}
.btn-g:hover{background:rgba(0,229,160,0.2);}
#csv-input{display:none;}
.file-btn{background:var(--surface);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:6px 13px;font-size:13px;cursor:pointer;transition:background 0.15s;white-space:nowrap;}
.file-btn:hover{background:var(--surface2);}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.filters span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-right:4px;}
.ftag{padding:4px 12px;font-size:12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.12s;white-space:nowrap;}
.ftag:hover{border-color:#555;color:var(--text);}
.ftag.on{border-color:var(--accent-b);background:var(--accent-dim);color:var(--accent);}
.fsel{padding:4px 10px;font-size:12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2,#1a1a1a);color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;}
.fsel.on{border-color:var(--accent-b);color:var(--accent);}
.stats{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 14px;min-width:76px;text-align:center;}
.stat-n{font-size:20px;font-weight:500;font-family:'DM Mono',monospace;}
.stat-l{font-size:11px;color:var(--muted);margin-top:1px;text-transform:uppercase;letter-spacing:0.4px;}
.s-a .stat-n{color:var(--accent);}
.s-r .stat-n{color:var(--blue);}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start;}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.col-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;font-weight:500;}
.col-count{font-size:12px;color:var(--muted2);font-family:'DM Mono',monospace;}
.col-body{display:flex;flex-direction:column;gap:6px;min-height:80px;border-radius:10px;padding:4px;transition:background 0.15s;}
.col-body.drag-over{background:rgba(0,229,160,0.05);border:1px dashed var(--accent-b);}
.card{background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--border);border-radius:10px;padding:10px 12px;cursor:grab;transition:border-color 0.15s,opacity 0.15s;user-select:none;}
.card:hover{border-color:var(--border2);}
.card.dragging{opacity:0.4;cursor:grabbing;}
.card.r-atendeu{border-left-color:var(--accent);}
.card.r-reuniao{border-left-color:var(--blue);}
.card.r-nao{border-left-color:var(--red);}
.card.r-retry{border-left-color:var(--yellow);}
.card.r-farm{border-left-color:var(--purple);}
.card.chat-active{border-color:var(--wa-b);box-shadow:0 0 0 1px var(--wa-b);}
.top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.av{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--muted);flex-shrink:0;font-family:'DM Mono',monospace;}
.info{flex:1;min-width:0;}
.nm{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mt{font-size:11px;color:var(--muted);margin-top:1px;font-family:'DM Mono',monospace;}
.pip{color:var(--muted2);margin-left:6px;font-size:10px;}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;flex-shrink:0;font-family:'DM Mono',monospace;font-weight:500;border:1px solid transparent;}
.b-calling{background:var(--yellow-dim);color:var(--yellow);border-color:var(--yellow-b);}
.b-atendeu{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-b);}
.b-nao{background:var(--red-dim);color:var(--red);border-color:var(--red-b);}
.b-reuniao{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-b);}
.b-retry{background:var(--yellow-dim);color:var(--yellow);border-color:var(--yellow-b);}
.b-farm{background:var(--purple-dim);color:var(--purple);border-color:var(--purple-b);}
.b-erro{background:var(--red-dim);color:var(--red);border-color:var(--red-b);}
.cbtn{display:flex;align-items:center;gap:5px;padding:5px 12px;font-size:12px;font-family:'DM Sans',sans-serif;border-radius:7px;cursor:pointer;flex-shrink:0;background:var(--accent-dim);border:1px solid var(--accent-b);color:var(--accent);transition:background 0.15s;font-weight:500;}
.cbtn:hover{background:rgba(0,229,160,0.2);}
.cbtn:active{transform:scale(0.97);}
.cbtn:disabled{opacity:0.35;cursor:default;transform:none;}
.cbtn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;flex-shrink:0;}
.wabtn{display:flex;align-items:center;gap:5px;padding:5px 10px;font-size:12px;font-family:'DM Sans',sans-serif;border-radius:7px;cursor:pointer;flex-shrink:0;background:var(--wa-dim);border:1px solid var(--wa-b);color:var(--wa);transition:background 0.15s;font-weight:500;}
.wabtn:hover{background:rgba(37,211,102,0.2);}
.wabtn:active{transform:scale(0.97);}
.wabtn svg{width:12px;height:12px;fill:currentColor;flex-shrink:0;}
.rrow{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.rrow.h{display:none;}
.rlbl{font-size:10px;color:var(--muted);margin-right:2px;text-transform:uppercase;letter-spacing:0.4px;flex-shrink:0;}
.rbtn{padding:3px 10px;font-size:11px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.12s;white-space:nowrap;}
.rbtn:hover{border-color:#555;color:var(--text);}
.rbtn.s-atendeu{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-b);}
.rbtn.s-nao{background:var(--red-dim);color:var(--red);border-color:var(--red-b);}
.rbtn.s-reuniao{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-b);}
.rbtn.s-retry{background:var(--yellow-dim);color:var(--yellow);border-color:var(--yellow-b);}
.rbtn.s-farm{background:var(--purple-dim);color:var(--purple);border-color:var(--purple-b);}
.ttag{margin-left:auto;font-size:10px;color:var(--muted2);font-family:'DM Mono',monospace;flex-shrink:0;}
.emsg{font-size:10px;color:var(--red);margin-top:2px;font-family:'DM Mono',monospace;}
.empty-col{font-size:13px;color:var(--muted2);text-align:center;padding:20px 0;}
footer{margin-top:20px;}
.fnote{font-size:11px;color:var(--muted2);}
@media(max-width:700px){.cols{grid-template-columns:1fr;}}

/* ─── CHAT PANEL ─── */
#chat-panel{
  position:fixed;top:0;right:0;width:var(--chat-w);height:100vh;
  background:var(--surface);border-left:1px solid var(--border2);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform 0.3s ease;
  z-index:100;
}
#chat-panel.open{transform:translateX(0);}
.cp-header{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.cp-av{width:34px;height:34px;border-radius:50%;background:var(--wa-dim);border:1px solid var(--wa-b);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--wa);flex-shrink:0;font-family:'DM Mono',monospace;}
.cp-info{flex:1;min-width:0;}
.cp-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cp-phone{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.cp-close{width:28px;height:28px;border-radius:7px;background:transparent;border:1px solid var(--border2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1;transition:all 0.15s;flex-shrink:0;}
.cp-close:hover{background:var(--surface2);color:var(--text);}
.cp-refresh{width:28px;height:28px;border-radius:7px;background:transparent;border:1px solid var(--border2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.cp-refresh:hover{background:var(--surface2);color:var(--text);}
.cp-refresh svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
.cp-refresh.spinning svg{animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.cp-tabs{display:flex;gap:2px;padding:8px 12px 0;border-bottom:1px solid var(--border);flex-shrink:0;}
.cp-tab{padding:5px 14px;font-size:12px;border-radius:7px 7px 0 0;border:1px solid transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.12s;border-bottom:none;}
.cp-tab:hover{color:var(--text);}
.cp-tab.active{border-color:var(--border2);border-bottom-color:var(--surface);background:var(--surface);color:var(--text);}
.cp-tab-content{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.cp-tab-pane{display:none;flex:1;flex-direction:column;overflow:hidden;}
.cp-tab-pane.active{display:flex;}
.chat-loading{display:flex;align-items:center;justify-content:center;flex:1;gap:8px;color:var(--muted);font-size:13px;}
.chat-loading-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted2);animation:dotpulse 1.2s ease-in-out infinite;}
.chat-loading-dots span:nth-child(2){animation-delay:0.2s;}
.chat-loading-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes dotpulse{0%,80%,100%{transform:scale(0.7);opacity:0.4;}40%{transform:scale(1);opacity:1;}}
.msg-area{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth;}
.msg-area::-webkit-scrollbar{width:4px;}
.msg-area::-webkit-scrollbar-track{background:transparent;}
.msg-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.msg-day{text-align:center;font-size:10px;color:var(--muted2);font-family:'DM Mono',monospace;margin:6px 0;flex-shrink:0;}
.bubble{max-width:85%;padding:8px 11px;border-radius:12px;font-size:13px;line-height:1.5;word-break:break-word;flex-shrink:0;}
.bubble.out{align-self:flex-end;background:#1e4035;border-radius:12px 12px 3px 12px;color:#e1f5e9;}
.bubble.in{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-radius:12px 12px 12px 3px;color:var(--text);}
.bubble.call-log{align-self:center;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:11px;font-family:'DM Mono',monospace;padding:5px 12px;display:flex;align-items:center;gap:6px;}
.bubble.call-log svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;}
.bubble.call-log.answered{border-color:var(--accent-b);color:var(--accent);}
.bubble.call-log.missed{border-color:var(--red-b);color:var(--red);}
.btime{font-size:10px;color:rgba(255,255,255,0.35);margin-top:3px;text-align:right;font-family:'DM Mono',monospace;}
.bubble.in .btime{color:var(--muted2);}
.bstatus{font-size:10px;color:var(--wa);margin-left:4px;}
.no-messages{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:8px;color:var(--muted2);font-size:13px;}
.no-messages svg{width:32px;height:32px;opacity:0.3;stroke:currentColor;fill:none;stroke-width:1.5;}
.cp-input-area{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:var(--surface);}
.cp-textarea{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:8px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;resize:none;max-height:100px;min-height:36px;transition:border-color 0.15s;line-height:1.5;}
.cp-textarea:focus{border-color:var(--wa-b);}
.cp-textarea::placeholder{color:var(--muted2);}
.cp-send{width:36px;height:36px;border-radius:9px;background:var(--wa-dim);border:1px solid var(--wa-b);color:var(--wa);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s;}
.cp-send:hover{background:rgba(37,211,102,0.22);}
.cp-send:disabled{opacity:0.3;cursor:default;}
.cp-send svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.no-cfg{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;padding:30px;text-align:center;color:var(--muted);}
.no-cfg svg{width:40px;height:40px;opacity:0.25;stroke:currentColor;fill:none;stroke-width:1.5;}
.no-cfg p{font-size:13px;line-height:1.6;}
.no-cfg strong{color:var(--text);}
/* Settings tab */
.wa-settings{padding:16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;}
.wa-settings-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.wa-save-btn{padding:7px 16px;font-size:13px;font-family:'DM Sans',sans-serif;border-radius:8px;cursor:pointer;background:var(--wa-dim);border:1px solid var(--wa-b);color:var(--wa);transition:background 0.15s;align-self:flex-start;}
.wa-save-btn:hover{background:rgba(37,211,102,0.2);}
.wa-conn-section{display:flex;flex-direction:column;gap:10px;}
.wa-connected-badge{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;background:var(--wa-dim);border:1px solid var(--wa-b);color:var(--wa);font-size:12px;font-family:'DM Mono',monospace;align-self:flex-start;}
.wa-connected-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--wa);}
.wa-disconnect-btn{padding:6px 14px;font-size:12px;font-family:'DM Sans',sans-serif;border-radius:7px;cursor:pointer;background:var(--red-dim);border:1px solid var(--red-b);color:var(--red);transition:background 0.15s;align-self:flex-start;}
.wa-disconnect-btn:hover{background:rgba(255,77,77,0.22);}
.qr-box{width:200px;height:200px;border-radius:12px;border:1px solid var(--border2);background:white;display:flex;align-items:center;justify-content:center;overflow:hidden;align-self:center;}
.qr-box img{width:100%;height:100%;}
.qr-hint{font-size:12px;color:var(--muted);text-align:center;line-height:1.6;max-width:240px;}
.qr-btn{padding:7px 16px;font-size:12px;font-family:'DM Sans',sans-serif;border-radius:8px;cursor:pointer;background:var(--wa-dim);border:1px solid var(--wa-b);color:var(--wa);transition:background 0.15s;align-self:flex-start;}
.qr-btn:hover{background:rgba(37,211,102,0.2);}
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.68A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
  </div>
  <h1>Hunter <span>Call</span></h1>
  <button class="wa-status-pill" id="wa-pill" onclick="openWaSettings()">
    <span class="dot"></span>
    <span id="wa-pill-label">WhatsApp desconectado</span>
  </button>
</header>

<div class="config-bar">
  <div class="cfg" style="flex:2;min-width:240px;">
    <label>API Key (API4COM)</label>
    <input type="password" id="api-key" value="TIJ6S3N5bPOaK3enhGJ2RFTsIXDlPeUD3szpaYpXbiDwOxyx4N8wjPW2XZq8H4rW">
  </div>
  <div class="cfg" style="flex:0 0 90px;">
    <label>Ramal</label>
    <input type="text" id="ext" value="1000">
  </div>
</div>

<div class="toolbar">
  <label class="file-btn" for="csv-input">&#128194; Importar CSV (Kommo ou Indicações)</label>
  <input type="file" id="csv-input" accept=".csv">
  <button class="btn" onclick="loadSample()">Exemplo</button>
  <button class="btn btn-g" onclick="exportCSV()" style="margin-left:auto;">&#8595; Exportar</button>
  <button class="btn" onclick="clearLeads()">Limpar</button>
</div>

<div class="filters" id="filters" style="display:none;">
  <span>Filtrar</span>
  <button class="ftag on" data-f="all" onclick="setFilter('all')">Todos</button>
  <button class="ftag" data-f="atendeu" onclick="setFilter('atendeu')">Atendeu</button>
  <button class="ftag" data-f="nao" onclick="setFilter('nao')">Nao atendeu</button>
  <button class="ftag" data-f="reuniao" onclick="setFilter('reuniao')">Reuniao marcada</button>
  <button class="ftag" data-f="retry" onclick="setFilter('retry')">Ligar de novo</button>
  <button class="ftag" data-f="farm" onclick="setFilter('farm')">Farm 3 meses</button>
  <button class="ftag" data-f="none" onclick="setFilter('none')">Sem resultado</button>
  <select id="f-ref" class="fsel" style="display:none;" onchange="setRefFilter(this.value)"><option value="all">Indicado por: todos</option></select>
  <select id="f-status" class="fsel" style="display:none;" onchange="setStatusFilter(this.value)"><option value="all">Status: todos</option></select>
</div>

<script>
var API_URL = 'https://api.api4com.com/api/v1/dialer';
var leads = [];
var activeFilter = 'all';
var activeRef = 'all';
var activeStatus = 'all';
function setRefFilter(v){activeRef=v;document.getElementById('f-ref').classList.toggle('on',v!=='all');renderAll();}
function setStatusFilter(v){activeStatus=v;document.getElementById('f-status').classList.toggle('on',v!=='all');renderAll();}
function populateLeadFilters(){
  var refs={},sts={};
  leads.forEach(function(l){if(l.ref)refs[l.ref]=1;if(l.refStatus)sts[l.refStatus]=1;});
  function fill(id,vals,label){
    var sel=document.getElementById(id);
    var keys=Object.keys(vals).sort();
    if(!keys.length){sel.style.display='none';sel.value='all';return;}
    sel.innerHTML='<option value="all">'+label+': todos</option>'+keys.map(function(k){return'<option value="'+escHtml(k)+'">'+escHtml(k)+'</option>';}).join('');
    sel.style.display='';sel.value='all';sel.classList.remove('on');
  }
  fill('f-ref',refs,'Indicado por');
  fill('f-status',sts,'Status');
  activeRef='all';activeStatus='all';
}
var dragIdx = null;
var activeChatIdx = null;
var waConnected = false;
var waCreds = {instance:'', token:'', clientToken:''};

var RL = {atendeu:'Atendeu', nao:'Nao atendeu', reuniao:'Reuniao marcada', retry:'Ligar de novo', farm:'Farm 3 meses'};
var BTNS = [
  {key:'atendeu', label:'Atendeu'},
  {key:'nao',     label:'Nao atendeu'},
  {key:'reuniao', label:'Reuniao marcada'},
  {key:'retry',   label:'Ligar de novo'},
  {key:'farm',    label:'Farm 3 meses'}
];

(function init(){
  var saved = localStorage.getItem('zapi_creds');
  if (saved) {
    try { waCreds = JSON.parse(saved); } catch(e){}
    document.getElementById('wa-instance').value     = waCreds.instance    || '';
    document.getElementById('wa-token').value        = waCreds.token       || '';
    document.getElementById('wa-client-token').value = waCreds.clientToken || '';
    if (waCreds.instance && waCreds.token) checkWaStatus();
  }
})();

function zapiUrl(path){ return 'https://api.z-api.io/instances/'+waCreds.instance+'/token/'+waCreds.token+path; }
function zapiHeaders(){ var h={'Content-Type':'application/json'}; if(waCreds.clientToken) h['Client-Token']=waCreds.clientToken; return h; }

async function checkWaStatus(){
  if (!waCreds.instance || !waCreds.token) return;
  try {
    var r = await fetch(zapiUrl('/status'), {headers: zapiHeaders()});
    var d = await r.json();
    setWaConnected(d.connected===true || d.status==='CONNECTED' || d.smartphoneConnected===true);
  } catch(e){ setWaConnected(false); }
}

function setWaConnected(connected){
  waConnected = connected;
  var pill = document.getElementById('wa-pill');
  document.getElementById('wa-pill-label').textContent = connected ? 'WhatsApp conectado' : 'WhatsApp desconectado';
  connected ? pill.classList.add('connected') : pill.classList.remove('connected');
  renderWaConnSection();
  updateNoCfgNotice();
}

function renderWaConnSection(){
  var sec = document.getElementById('wa-conn-section');
  var area = document.getElementById('wa-conn-status-area');
  if (!waCreds.instance || !waCreds.token){ sec.style.display='none'; return; }
  sec.style.display = 'flex';
  sec.style.flexDirection = 'column';
  sec.style.gap = '10px';
  if (waConnected){
    area.innerHTML = '<div class="wa-connected-badge"><span class="dot"></span>Conectado e pronto</div>'+
      '<button class="wa-disconnect-btn" onclick="disconnectWa()">Desconectar</button>';
  } else {
    area.innerHTML = '<div id="qr-area-inner" style="display:flex;flex-direction:column;gap:10px;align-items:flex-start;">'+
      '<button class="qr-btn" onclick="loadQR()">Carregar QR Code</button></div>';
  }
}

async function loadQR(){
  var el = document.getElementById('qr-area-inner');
  if (!el) return;
  el.innerHTML = '<div class="chat-loading"><div class="chat-loading-dots"><span></span><span></span><span></span></div></div>';
  try {
    var r = await fetch(zapiUrl('/qr-code/image'), {headers: zapiHeaders()});

    if (!r.ok) {
      // Try to read error as text for debugging
      var errText = '';
      try { errText = await r.text(); } catch(e2){}
      var errMsg = 'HTTP '+r.status;
      try { var errJson = JSON.parse(errText); errMsg = errJson.error || errJson.message || errMsg; } catch(e2){}
      el.innerHTML = '<p style="color:var(--red);font-size:12px;">Erro '+r.status+': '+escHtml(errMsg)+'</p>'+
        '<p style="color:var(--muted);font-size:11px;margin-top:4px;">Verifique se o Instance ID e Token estao corretos.<br>Se Client-Token esta ativado na sua conta, preencha o campo acima.</p>'+
        '<button class="qr-btn" onclick="loadQR()" style="margin-top:8px;">Tentar novamente</button>';
      return;
    }

    // Z-API returns base64 string directly (not JSON) for /qr-code/image
    var contentType = r.headers.get('content-type') || '';
    var src = '';

    if (contentType.indexOf('application/json') >= 0 || contentType.indexOf('text/plain') >= 0) {
      // Some versions return JSON with a value field
      var text = await r.text();
      try {
        var d = JSON.parse(text);
        src = d.value || d.qrcode || d.qr || d.base64 || '';
        // If src doesn't start with data:, wrap it
        if (src && !src.startsWith('data:')) src = 'data:image/png;base64,' + src;
      } catch(e2) {
        // raw base64 string
        src = 'data:image/png;base64,' + text.trim();
      }
    } else if (contentType.indexOf('image/') >= 0) {
      // Binary image — convert to blob URL
      var blob = await r.blob();
      src = URL.createObjectURL(blob);
    } else {
      // Unknown — try reading as text (base64)
      var text = await r.text();
      var clean = text.trim();
      if (clean.startsWith('data:')) {
        src = clean;
      } else if (clean.length > 100) {
        src = 'data:image/png;base64,' + clean;
      }
    }

    if (src){
      el.innerHTML = '<div class="qr-box"><img src="'+src+'" alt="QR Code"></div>'+
        '<p class="qr-hint">Abra o WhatsApp &rarr; Dispositivos vinculados &rarr; Vincular dispositivo</p>'+
        '<button class="qr-btn" onclick="loadQR()">Atualizar QR</button>'+
        '<button class="qr-btn" onclick="checkWaStatus()">Ja escaniei</button>';
    } else {
      el.innerHTML = '<p style="color:var(--red);font-size:12px;">Resposta inesperada da Z-API. Tente novamente.</p>'+
        '<button class="qr-btn" onclick="loadQR()">Tentar novamente</button>';
    }
  } catch(e){
    el.innerHTML = '<p style="color:var(--red);font-size:12px;">Erro de conexao: '+escHtml(e.message)+'</p>'+
      '<p style="color:var(--muted);font-size:11px;margin-top:4px;">Verifique sua conexao e as credenciais Z-API.</p>'+
      '<button class="qr-btn" onclick="loadQR()" style="margin-top:8px;">Tentar novamente</button>';
  }
}

async function disconnectWa(){
  if (!confirm('Desconectar o WhatsApp?')) return;
  try { await fetch(zapiUrl('/disconnect'), {method:'DELETE', headers: zapiHeaders()}); } catch(e){}
  setWaConnected(false);
}

function saveWaCreds(){
  waCreds.instance    = document.getElementById('wa-instance').value.trim();
  waCreds.token       = document.getElementById('wa-token').value.trim();
  waCreds.clientToken = document.getElementById('wa-client-token').value.trim();
  if (!waCreds.instance || !waCreds.token){ alert('Preencha Instance ID e Token.'); return; }
  localStorage.setItem('zapi_creds', JSON.stringify(waCreds));
  checkWaStatus();
}

function updateNoCfgNotice(){
  var notice = document.getElementById('no-cfg-notice');
  if (!notice) return;
  if (!waCreds.instance || !waCreds.token){ notice.style.display='flex'; return; }
  notice.style.display = 'none';
  if (activeChatIdx !== null) renderMessages();
}

// CHAT PANEL
function openChat(i){
  activeChatIdx = i;
  var l = leads[i];
  document.getElementById('cp-av').textContent    = initials(l.name);
  document.getElementById('cp-name').textContent  = l.name;
  document.getElementById('cp-phone').textContent = fmtPhone(l.phone);
  document.getElementById('chat-panel').classList.add('open');
  document.body.classList.add('chat-open');
  document.querySelectorAll('.card').forEach(function(c){ c.classList.remove('chat-active'); });
  var el = document.getElementById('card-'+i);
  if (el) el.classList.add('chat-active');
  switchTab('messages');
  updateNoCfgNotice();
  if (waCreds.instance && waCreds.token) renderMessages();
}

function closeChat(){
  document.getElementById('chat-panel').classList.remove('open');
  document.body.classList.remove('chat-open');
  document.querySelectorAll('.card').forEach(function(c){ c.classList.remove('chat-active'); });
  activeChatIdx = null;
}

function switchTab(tab){
  document.querySelectorAll('.cp-tab').forEach(function(t){ t.classList.toggle('active', t.getAttribute('data-tab')===tab); });
  document.querySelectorAll('.cp-tab-pane').forEach(function(p){ p.classList.toggle('active', p.id==='tab-'+tab); });
  if (tab === 'settings') renderWaConnSection();
  if (tab === 'transcript') loadTranscripts();
}

// ─── TRANSCRICAO ───
// Ajuste essa URL para o dominio do seu deploy no Vercel, ex:
// 'https://hunter-crm-green.vercel.app/api/get-transcript'
var TRANSCRIPT_API_URL = '/api/get-transcript';

async function loadTranscripts(){
  var area = document.getElementById('transcript-area');
  if (!area || activeChatIdx === null) return;
  var l = leads[activeChatIdx];
  area.innerHTML = '<div class="chat-loading"><div class="chat-loading-dots"><span></span><span></span><span></span></div><span>Carregando...</span></div>';
  try {
    var r = await fetch(TRANSCRIPT_API_URL + '?phone=' + encodeURIComponent(cleanPhone(l.phone)));
    var d = await r.json();
    var calls = d.calls || [];
    if (!calls.length){
      area.innerHTML = '<p style="color:var(--muted);font-size:13px;">Nenhuma call gravada encontrada para este lead ainda.</p>';
      return;
    }
    var html = '';
    for (var i=0; i<calls.length; i++){
      var c = calls[i];
      var statusLabel = {pendente:'Aguardando gravação', sem_gravacao:'Sem gravação', transcrevendo:'Transcrevendo...', pronto:'Transcrito', erro:'Erro na transcrição'}[c.transcript_status] || c.transcript_status;
      html += '<div style="border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;">'+
        '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:8px;font-family:\'DM Mono\',monospace;">'+
          '<span>'+(c.started_at ? new Date(c.started_at).toLocaleString('pt-BR') : '')+'</span>'+
          '<span>'+statusLabel+'</span>'+
        '</div>'+
        (c.record_url ? '<audio controls style="width:100%;margin-bottom:8px;" src="'+c.record_url+'"></audio>' : '')+
        (c.transcript ? '<p style="font-size:13px;line-height:1.5;white-space:pre-wrap;">'+escHtml(c.transcript)+'</p>' : '<p style="font-size:12px;color:var(--muted2);">Transcrição ainda não disponível.</p>')+
      '</div>';
    }
    area.innerHTML = html;
  } catch(e){
    area.innerHTML = '<p style="color:var(--red);font-size:12px;">Erro ao buscar transcrições: '+escHtml(e.message)+'</p>';
  }
}

function openWaSettings(){
  if (!document.getElementById('chat-panel').classList.contains('open')){
    document.getElementById('cp-av').textContent    = 'WA';
    document.getElementById('cp-name').textContent  = 'Configuracoes';
    document.getElementById('cp-phone').textContent = 'WhatsApp Z-API';
    document.getElementById('chat-panel').classList.add('open');
    document.body.classList.add('chat-open');
  }
  switchTab('settings');
}

function refreshChat(){
  if (activeChatIdx === null) return;
  var btn = document.getElementById('cp-refresh-btn');
  btn.classList.add('spinning');
  renderMessages(function(){ btn.classList.remove('spinning'); });
}

async function renderMessages(cb){
  var wrap = document.getElementById('msg-area-wrap');
  if (!wrap) return;
  if (!waCreds.instance || !waCreds.token){ updateNoCfgNotice(); if(cb) cb(); return; }
  wrap.innerHTML = '<div class="chat-loading"><div class="chat-loading-dots"><span></span><span></span><span></span></div><span>Carregando...</span></div>';
  var l = leads[activeChatIdx];
  var phone = cleanPhone(l.phone).replace('+','');
  try {
    var r = await fetch(zapiUrl('/chat-messages/'+phone+'?page=1&pageSize=40'), {headers: zapiHeaders()});
    var d = await r.json();
    var msgs = Array.isArray(d) ? d : (d.messages && Array.isArray(d.messages) ? d.messages : []);
    var callLogs = l.calledAt ? [{type:'call', ts: l.calledAt, result: l.result}] : [];
    renderMsgArea(wrap, msgs, callLogs);
  } catch(e){
    wrap.innerHTML = '<div class="no-cfg"><p style="color:var(--red);font-size:12px;">Erro ao carregar:<br>'+escHtml(e.message)+'</p>'+
      '<button class="qr-btn" onclick="renderMessages()">Tentar novamente</button></div>';
  }
  if (cb) cb();
}

function renderMsgArea(wrap, msgs, callLogs){
  var items = [];
  for (var i=0; i<msgs.length; i++){
    var m = msgs[i];
    var ts = m.timestamp ? (m.timestamp > 9999999999 ? m.timestamp : m.timestamp*1000) : 0;
    var fromMe = m.fromMe === true || m.fromMe === 'true';
    var text = (m.text && m.text.message) ? m.text.message : (m.body || m.caption || m.message || '');
    if (!text && m.type && m.type !== 'text') text = '['+m.type+']';
    if (!text) continue;
    items.push({kind:'msg', ts:ts, fromMe:fromMe, text:text, status:m.status});
  }
  for (var j=0; j<callLogs.length; j++){
    items.push({kind:'call', ts:callLogs[j].ts, result:callLogs[j].result});
  }
  items.sort(function(a,b){ return a.ts - b.ts; });
  if (!items.length){
    wrap.innerHTML = '<div class="no-messages"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span>Sem mensagens ainda</span></div>';
    return;
  }
  var html = '<div class="msg-area" id="msg-area">';
  var lastDay = '';
  for (var k=0; k<items.length; k++){
    var item = items[k];
    var day = item.ts ? new Date(item.ts).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}) : '';
    if (day && day !== lastDay){ html += '<div class="msg-day">'+day+'</div>'; lastDay = day; }
    if (item.kind === 'call'){
      var answered = item.result === 'atendeu' || item.result === 'reuniao';
      var callLabel = item.result ? RL[item.result] : 'Ligacao realizada';
      html += '<div class="bubble call-log '+(answered?'answered':'missed')+'">'+
        '<svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.68A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>'+
        callLabel+(item.ts?' &middot; '+new Date(item.ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'')+'</div>';
    } else {
      var timeStr = item.ts ? new Date(item.ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '';
      var statusMark = '';
      if (item.fromMe){
        if      (item.status==='READ')     statusMark = '<span class="bstatus">&#10003;&#10003;</span>';
        else if (item.status==='RECEIVED') statusMark = '<span class="bstatus" style="color:var(--muted)">&#10003;&#10003;</span>';
        else if (item.status==='SENT')     statusMark = '<span class="bstatus" style="color:var(--muted)">&#10003;</span>';
      }
      html += '<div class="bubble '+(item.fromMe?'out':'in')+'">'+escHtml(item.text)+
        '<div class="btime">'+timeStr+statusMark+'</div></div>';
    }
  }
  html += '</div>';
  wrap.innerHTML = html;
  var ma = document.getElementById('msg-area');
  if (ma) ma.scrollTop = ma.scrollHeight;
}

async function sendMessage(){
  if (activeChatIdx === null) return;
  if (!waCreds.instance || !waCreds.token){ alert('Configure o WhatsApp primeiro.'); return; }
  var inp = document.getElementById('cp-msg-input');
  var text = inp.value.trim();
  if (!text) return;
  var btn = document.getElementById('cp-send-btn');
  btn.disabled = true; inp.disabled = true;
  var l = leads[activeChatIdx];
  var phone = cleanPhone(l.phone).replace('+','');
  try {
    var r = await fetch(zapiUrl('/send-text'), {
      method: 'POST', headers: zapiHeaders(),
      body: JSON.stringify({phone: phone, message: text})
    });
    var d = await r.json();
    if (r.ok && (d.zaapId || d.messageId || d.id)){
      inp.value = ''; inp.style.height = 'auto'; renderMessages();
    } else {
      alert('Erro ao enviar: ' + (d.message || d.error || JSON.stringify(d)));
    }
  } catch(e){ alert('Erro de conexao: '+e.message); }
  btn.disabled = false; inp.disabled = false; inp.focus();
}

function onMsgKeydown(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function parseCSVLine(line){
  var cols=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;}}
    else if(c===','&&!inQ){cols.push(cur);cur='';}
    else{cur+=c;}
  }
  cols.push(cur); return cols;
}
function cleanPhone(raw){
  if(!raw)return'';
  var s=raw.replace(/^[\s'+]+/,'');
  var d=s.replace(/\D/g,'');
  if(!d||d.length<8)return'';
  if(!d.startsWith('55'))d='55'+d;
  return'+'+d;
}
function initials(n){ return n.trim().split(/\s+/).slice(0,2).map(function(x){return x[0]||'';}).join('').toUpperCase(); }
function fmtPhone(p){
  var d=p.replace(/\D/g,'');
  var loc=d.length>11?d.slice(-11):d;
  if(loc.length===11)return'('+loc.slice(0,2)+') '+loc.slice(2,7)+'-'+loc.slice(7);
  if(loc.length===10)return'('+loc.slice(0,2)+') '+loc.slice(2,6)+'-'+loc.slice(6);
  return p;
}
function fmtTime(ts){ return ts?new Date(ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):''; }
function newLead(name,phone,pipeline){ return{name:name,phone:phone,pipeline:pipeline,result:null,calledAt:null,calling:false,apiError:false,errorMsg:'',col:'queue'}; }

function parseIndicacoesCSV(lines,header){
  function findCol(terms){for(var k=0;k<header.length;k++)for(var t=0;t<terms.length;t++)if(header[k].indexOf(terms[t])>=0)return k;return-1;}
  var nameIdx=findCol(['nome']);
  var phoneIdx=findCol(['número','numero','telefone']);
  var refIdx=findCol(['indicado por','indicado']);
  var statusIdx=findCol(['status']);
  var obsIdx=findCol(['observa']);
  var result=[],seen={};
  for(var i=1;i<lines.length;i++){
    var line=lines[i].replace(/\r$/,'').trim();if(!line)continue;
    var cols=parseCSVLine(line);
    var name=(cols[nameIdx]||'').trim();
    var phone=cleanPhone((cols[phoneIdx]||'').trim());
    if(!name&&!phone)continue;
    if(!name)name='Sem nome';
    if(!phone)continue;if(seen[phone])continue;seen[phone]=true;
    var ref=refIdx>=0?(cols[refIdx]||'').trim():'';
    var status=statusIdx>=0?(cols[statusIdx]||'').trim():'';
    var obs=obsIdx>=0?(cols[obsIdx]||'').trim():'';
    var pipeline=[ref?('Ind: '+ref):'',status].filter(Boolean).join(' • ');
    if(obs)pipeline+=(pipeline?' • ':'')+obs;
    var ld=newLead(name,phone,pipeline);
    ld.ref=ref;ld.refStatus=status;
    result.push(ld);
  }
  if(!result.length){alert('Nenhum lead com telefone encontrado.');return null;}
  return result;
}

function parseKommoCSV(text){
  var lines=text.trim().split('\n');
  if(lines.length<2){alert('CSV vazio.');return null;}
  var header=parseCSVLine(lines[0].replace(/\r$/,'')).map(function(h){return h.trim().toLowerCase();});
  // Auto-detecta formato "Novas Indicações" (Nome, Número, Indicado por, Status...)
  if(header.indexOf('número')>=0||header.indexOf('numero')>=0||header.indexOf('indicado por')>=0){
    return parseIndicacoesCSV(lines,header);
  }
  function findCol(terms){for(var k=0;k<header.length;k++)for(var t=0;t<terms.length;t++)if(header[k].indexOf(terms[t])>=0)return k;return-1;}
  var nameIdx=findCol(['nome completo']);
  var titleIdx=findCol(['lead titulo','titulo']);
  var phone1=findCol(['telefone comercial']);
  var phone2=findCol(['tel. direto','tel direto']);
  var phone3=findCol(['celular']);
  var phone4=findCol(['outro telefone']);
  var stageIdx=findCol(['etapa do lead','etapa']);
  if(nameIdx<0)nameIdx=17;if(titleIdx<0)titleIdx=1;if(phone1<0)phone1=21;if(stageIdx<0)stageIdx=15;
  var result=[],seen={};
  for(var i=1;i<lines.length;i++){
    var line=lines[i].trim();if(!line)continue;
    var cols=parseCSVLine(line);
    var name=(cols[nameIdx]||'').trim();
    if(!name)name=(cols[titleIdx]||'').trim();
    if(!name)name='Sem nome';
    var phoneRaw='';
    var candidates=[phone1,phone2,phone3,phone4];
    for(var ci=0;ci<candidates.length;ci++){var idx=candidates[ci];if(idx>=0&&cols[idx]&&cols[idx].trim()){phoneRaw=cols[idx].trim();break;}}
    var phone=cleanPhone(phoneRaw);
    if(!phone)continue;if(seen[phone])continue;seen[phone]=true;
    var stage=stageIdx>=0?(cols[stageIdx]||'').trim():'';
    result.push(newLead(name,phone,stage));
  }
  if(!result.length){alert('Nenhum lead com telefone encontrado.');return null;}
  return result;
}

function setFilter(f){
  activeFilter=f;
  document.querySelectorAll('.ftag').forEach(function(el){el.classList.toggle('on',el.getAttribute('data-f')===f);});

}

function badgeHtml(l){
  if(l.calling)return'<span class="badge b-calling">Ligando...</span>';

  if(l.result)return'<span class="badge b-'+l.result+'">'+RL[l.result]+'</span>';
  return'';
}

      (l.calledAt?'<span class="ttag">'+fmtTime(l.calledAt)+'</span>':'')+
    '</div>'+
  '</div>';
}

function renderAll(){
  var qEl=document.getElementById('col-queue');
  var dEl=document.getElementById('col-done');
  var qHtml='',qCnt=0,dCnt=0,dCards=[];
  for(var i=0;i<leads.length;i++){
    var l=leads[i];
    var inFilter=(activeFilter==='all')||(activeFilter==='none'&&!l.result)||(l.result===activeFilter);
    if(activeRef!=='all'&&l.ref!==activeRef)inFilter=false;
    if(activeStatus!=='all'&&l.refStatus!==activeStatus)inFilter=false;
    if(!inFilter)continue;
    if(l.col==='queue'){qHtml+=cardHtml(l,i);qCnt++;}
    else{dCards.push({i:i,ts:l.calledAt||0});dCnt++;}
  }
  dCards.sort(function(a,b){return b.ts-a.ts;});
  var dHtml='';
  for(var j=0;j<dCards.length;j++)dHtml+=cardHtml(leads[dCards[j].i],dCards[j].i);
  qEl.innerHTML=qHtml||'<p class="empty-col">Nenhum lead na fila.</p>';
  dEl.innerHTML=dHtml||'';
  document.getElementById('cnt-queue').textContent=qCnt;
  document.getElementById('cnt-done').textContent=dCnt;
  renderStats();
}

function setResult(i,key){
  leads[i].result=leads[i].result===key?null:key;
  renderAll();
  if(activeChatIdx===i&&waCreds.instance&&waCreds.token)renderMessages();
}

async function callLead(i){
  var apiKey=document.getElementById('api-key').value.trim();
  var ext=document.getElementById('ext').value.trim();
  if(!apiKey){alert('Preencha a API key.');return;}
  if(!ext){alert('Preencha o ramal.');return;}
  leads[i].calling=true;leads[i].apiError=false;leads[i].errorMsg='';
  renderAll();
  try{
    var phone=cleanPhone(leads[i].phone);
    var res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':apiKey},body:JSON.stringify({extension:ext,phone:phone,metadata:{lead_name:leads[i].name,lead_phone:phone}})});
    var data={};try{data=await res.json();}catch(e){data={};}
    leads[i].calling=false;leads[i].calledAt=Date.now();
    if(!res.ok){
      leads[i].apiError=true;
      if(data.error&&data.error.message)leads[i].errorMsg=data.error.message;
      else if(typeof data.message==='string')leads[i].errorMsg=data.message;
      else leads[i].errorMsg='HTTP '+res.status;
    }else{leads[i].col='done';}
  }catch(e){
    leads[i].calling=false;leads[i].calledAt=Date.now();leads[i].apiError=true;
    leads[i].errorMsg=(e&&e.message)?e.message:'Erro de conexao';
  }
  renderAll();
}

function onDragStart(e,i){dragIdx=i;setTimeout(function(){var el=document.getElementById('card-'+i);if(el)el.classList.add('dragging');},0);e.dataTransfer.effectAllowed='move';}
function onDragEnd(e){if(dragIdx!==null){var el=document.getElementById('card-'+dragIdx);if(el)el.classList.remove('dragging');}document.querySelectorAll('.col-body').forEach(function(c){c.classList.remove('drag-over');});dragIdx=null;}
function onDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function onDrop(e,col){e.preventDefault();e.currentTarget.classList.remove('drag-over');if(dragIdx===null)return;leads[dragIdx].col=col;renderAll();}

document.getElementById('csv-input').addEventListener('change',function(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){var parsed=parseKommoCSV(ev.target.result);if(parsed){leads=parsed;document.getElementById('filters').style.display='flex';populateLeadFilters();renderAll();}};
  r.readAsText(f,'UTF-8');
});

function clearLeads(){
  leads=[];activeFilter='all';activeRef='all';activeStatus='all';activeChatIdx=null;closeChat();
  document.getElementById('f-ref').style.display='none';
  document.getElementById('f-status').style.display='none';
  document.getElementById('csv-input').value='';
  document.getElementById('filters').style.display='none';
  document.getElementById('col-queue').innerHTML='<p class="empty-col">Importe o CSV do Kommo ou clique em Exemplo.</p>';
  document.getElementById('col-done').innerHTML='';
  document.getElementById('cnt-queue').textContent='0';
  document.getElementById('cnt-done').textContent='0';
  renderStats();
}

function exportCSV(){
  if(!leads.length){alert('Nenhum lead.');return;}
  var rows=[['Nome','Telefone','Etapa','Resultado','Coluna','Horario']];
  for(var i=0;i<leads.length;i++){
    var l=leads[i];
    rows.push([l.name,l.phone,l.pipeline||'',RL[l.result]||'',l.col==='queue'?'Fila':'Ligados',l.calledAt?fmtTime(l.calledAt):'']);
  }
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='resultado_ligacoes.csv';a.click();
}
